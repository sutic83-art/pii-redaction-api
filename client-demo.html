<!doctype html>
<html lang="sr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>PII Redaction API Demo</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 900px; margin: 40px auto; padding: 20px; }
    textarea, input, select, button { width: 100%; margin-top: 10px; padding: 10px; }
    textarea { min-height: 140px; }
    pre { background: #f4f4f4; padding: 12px; overflow: auto; white-space: pre-wrap; }
    .row { margin-bottom: 18px; }
  </style>
</head>
<body>
  <h1>PII Redaction API Demo</h1>

  <div class="row">
    <label>API URL</label>
    <input id="apiUrl" value="https://pii-redaction-api.onrender.com/api/v1/redact" />
  </div>

  <div class="row">
    <label>API Key</label>
    <input id="apiKey" type="password" />
  </div>

  <div class="row">
    <label>Policy</label>
    <select id="policy">
      <option value="mask">mask</option>
      <option value="hash">hash</option>
      <option value="rm">rm</option>
    </select>
  </div>

  <div class="row">
    <label>Text</label>
    <textarea id="text">JMBG 0101990712345 i PIB 100000049</textarea>
  </div>

  <div class="row">
    <button id="sendBtn">Pošalji</button>
  </div>

  <h2>Odgovor</h2>
  <pre id="output"></pre>

  <script>
    document.getElementById("sendBtn").addEventListener("click", async () => {
      const apiUrl = document.getElementById("apiUrl").value.trim();
      const apiKey = document.getElementById("apiKey").value.trim();
      const text = document.getElementById("text").value;
      const policy = document.getElementById("policy").value;
      const output = document.getElementById("output");

      output.textContent = "Slanje zahteva...";

      try {
        const res = await fetch(apiUrl, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey
          },
          body: JSON.stringify({ text, policy })
        });

        const data = await res.json();
        output.textContent = JSON.stringify(data, null, 2);
      } catch (err) {
        output.textContent = "Greška: " + err.message;
      }
    });
  </script>
</body>
</html>
